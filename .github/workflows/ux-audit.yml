name: UX Audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'app/**'
      - 'components/**'
      - 'pages/**'
      - 'package.json'
      - '.claude/**'
      - 'CLAUDE.md'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (for package.json parsing)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Make script executable
        run: chmod +x ./scripts/ci-audit.sh

      - name: Run UX audit (changed files only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: ./scripts/ci-audit.sh --changed-only

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-audit-report
          path: |
            audit-report.md
            audit-report.json

      - name: Comment report on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('audit-report.md')) return;
            const body = fs.readFileSync('audit-report.md', 'utf8');
            const truncated = body.length > 60000
              ? body.slice(0, 60000) + '\n\n*(report truncated — see workflow artifact)*'
              : body;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🔍 UX Audit Report\n\n' + truncated
            });
